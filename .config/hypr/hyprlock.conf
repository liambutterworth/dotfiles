background {
    blur_passes = 2
    monitor = DP-2
}

background {
    blur_passes = 2
    brightness = 0.5
    contrast = 1
    monitor = DP-2
    path = ~/.config/hypr/wallpapers/abstract-landscape.jpg
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgb(c5c9c5)
    inner_color = rgba(0d0c0c33)
    font_color = rgb(c5c9c5)
    fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = <i><span foreground="##727169">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 22
  font_family = SauceCodePro NF
  position = 0, 300
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  color = rgba(242, 243, 244, 0.75)
  font_size = 95
  font_family = SacueCodePro NF Bold
  position = 0, 200
  halign = center
  valign = center
}
