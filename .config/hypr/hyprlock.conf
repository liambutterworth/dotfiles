animations {
    animation = inputFieldDots, 0, 0, default
}

background {
    blur_passes = 2
    brightness = 0.5
    contrast = 1
    monitor = DP-2
    path = ~/.config/hypr/wallpapers/abstract-landscape.jpg
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = false
    no_fade_in = true
    no_fade_out = true
}

label {
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(c5c9c5)
  font_size = 22
  font_family = SauceCodePro Nerd Font Medium
  position = 0, 224
  halign = center
  valign = center
}

label {
  color = rgb(c5c9c5)
  font_size = 95
  font_family = SauceCodePro Nerd Font Bold
  halign = center
  position = 0, 128
  text = cmd[update:1000] echo "$(date +"%-I:%M")"
  valign = center
}

input-field {
    check_color = rgb(c8c093)
    dots_center = true
    dots_size = 0.2
    dots_spacing = 0.35
    fail_color = rgb(c4746e)
    fail_timeout = 2000
    halign = center
    hide_input = false
    inner_color = rgba(0d0c0c33)
    outer_color = rgb(c5c9c5)
    outline_thickness = 2
    fade_on_empty = false
    font_color = rgb(c5c9c5)
    placeholder_text =
    position = 0, -128
    rounding = -1
    size = 328, 64
    valign = center
}
